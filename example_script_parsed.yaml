  quote: There is no ether.
- id: 3
  type: solo
  character: Einstein
  quote: Subtle is the Lord, mysterious he is not.
- id: 4
  type: text_card
  body: 'Michelson believed in the ether until he died in 1931. In the late 1800s,
    physicists believed that light waves needed a medium to travel through, just as
    sound travels through air or ripples travel through water. They called this invisible
    substance the luminiferous ether. Einstein wasn''t even sure he''d read the experiment.
    Instead of trying to explain why the ether wind couldn''t be detected, Einstein
    started with a radical assumption: The ether doesn''t exist. He proposed two simple
    postulates that changed everything.'
